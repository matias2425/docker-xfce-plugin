<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Background Gradient (Greyed out for offline state) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="50%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    
    <!-- Docker Logo Gradient (Semi-transparent white/grey) -->
    <linearGradient id="dockerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    
    <!-- Shadow Filter for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Premium Rounded Icon Base -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#bgGrad)" filter="url(#dropShadow)" />
  
  <!-- Subtle inner border for premium glass/plastic feel -->
  <rect x="2.5" y="2.5" width="43" height="43" rx="9.5" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />

  <!-- Docker Whale and Containers Group -->
  <g transform="translate(4, 4) scale(0.833)" fill="url(#dockerGrad)" opacity="0.6">
    <!-- Containers (Stack grid on the whale) -->
    <!-- Column 1 -->
    <rect x="8" y="10" width="4" height="4" rx="0.5" />
    <rect x="8" y="15" width="4" height="4" rx="0.5" />
    <rect x="8" y="20" width="4" height="4" rx="0.5" />
    
    <!-- Column 2 -->
    <rect x="13" y="10" width="4" height="4" rx="0.5" />
    <rect x="13" y="15" width="4" height="4" rx="0.5" />
    <rect x="13" y="20" width="4" height="4" rx="0.5" />
    
    <!-- Column 3 -->
    <rect x="18" y="10" width="4" height="4" rx="0.5" />
    <rect x="18" y="15" width="4" height="4" rx="0.5" />
    <rect x="18" y="20" width="4" height="4" rx="0.5" />
    
    <!-- Column 4 (Front stack) -->
    <rect x="23" y="15" width="4" height="4" rx="0.5" />
    <rect x="23" y="20" width="4" height="4" rx="0.5" />

    <!-- Whale Body -->
    <path d="M41.7,21.3 C40.8,20.5 39.5,20.1 38.3,20.1 C38.0,20.1 37.7,20.1 37.4,20.2 C36.5,18.7 34.9,17.7 33.1,17.7 C32.9,17.7 32.7,17.7 32.5,17.7 C31.8,15.8 30.0,14.5 27.9,14.5 C27.5,14.5 27.2,14.5 26.8,14.6 L26.8,24.1 L6.0,24.1 C5.8,24.4 5.7,24.7 5.7,25.0 C5.7,29.9 9.8,34.0 14.7,34.0 L33.2,34.0 C36.9,34.0 40.0,31.2 40.5,27.6 C42.1,27.1 43.3,25.7 43.7,24.0 C44.0,22.8 43.1,21.6 41.7,21.3 Z" />
    
    <!-- Splash / Water Spout (Tail area) -->
    <path d="M43.0,13.0 C41.5,14.5 39.0,14.8 38.2,14.9 C38.7,13.9 39.2,11.2 37.5,9.5 C36.5,8.5 35.0,8.5 34.0,9.5 C33.0,10.5 33.0,12.0 34.0,13.0 C34.5,13.5 35.5,14.0 36.5,14.2 C35.0,14.5 33.0,15.5 32.5,17.0 C33.5,17.0 35.5,16.5 36.8,15.6 C36.7,16.1 36.7,16.7 36.9,17.2 C37.8,17.0 39.2,16.2 40.2,15.0 C41.5,15.5 43.0,15.0 43.5,14.0 C43.8,13.6 43.4,13.0 43.0,13.0 Z" />
  </g>
</svg>
